<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Mobile Barcode App</title>
  <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 全体を縦分割 */
    #container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 枠1（カメラ + UI） */
    #top {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }

    /* カメラ */
    #video {
      flex: 1;
      position: relative;
    }

    canvas.drawingBuffer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    /* UI部分 */
    #controls {
      background: #111;
      color: #fff;
      padding: 10px;
      text-align: center;
    }

    #live {
      font-size: 18px;
      margin-bottom: 10px;
      color: #00ff88;
    }

    button {
      width: 90%;
      padding: 12px;
      font-size: 16px;
    }

    /* 枠2（リスト） */
    #bottom {
      flex: 1;
      background: #f5f5f5;
      overflow-y: auto;
      padding: 10px;
    }

    li {
      padding: 5px;
      border-bottom: 1px solid #ccc;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="container">

  <!-- 枠1 -->
  <div id="top">
    <div id="video"></div>

    <div id="controls">
      <div id="live">-</div>
      <button id="capture">Capture</button>
    </div>
  </div>

  <!-- 枠2 -->
  <div id="bottom">
    <ul id="list"></ul>
  </div>

</div>

<script>
let lastDetected = null;
let history = [];

// 初期化
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector('#video'),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: ["ean_reader", "ean_8_reader", "code_128_reader"]
  }
}, function(err) {
  if (err) {
    console.error(err);
    return;
  }
  Quagga.start();
});

// リアルタイム表示
Quagga.onDetected(function(result) {
  const code = result.codeResult.code;

  if (code !== lastDetected) {
    lastDetected = code;
    document.getElementById("live").textContent = code;
  }
});

// キャプチャ
document.getElementById('capture').addEventListener('click', () => {
  if (!lastDetected) return;

  history.push(lastDetected);

  const li = document.createElement("li");
  li.textContent = lastDetected;
  document.getElementById("list").appendChild(li);
});
</script>

</body>
</html>
